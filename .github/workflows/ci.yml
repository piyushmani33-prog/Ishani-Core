name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint new source files
        run: |
          ruff check \
            techbuzz-full/techbuzz-full/backend_python/config.py \
            techbuzz-full/techbuzz-full/backend_python/middleware.py \
            techbuzz-full/techbuzz-full/backend_python/health_check.py \
            techbuzz-full/techbuzz-full/backend_python/platform_status.py \
            techbuzz-full/techbuzz-full/backend_python/unified_brain_registry.py \
            techbuzz-full/techbuzz-full/backend_python/unified_agent_registry.py \
            techbuzz-full/techbuzz-full/backend_python/settings_manager.py \
            tests/test_config.py \
            tests/test_middleware.py \
            tests/test_deployment.py \
            tests/test_learning_system.py \
            tests/test_platform_status.py \
            tests/test_brain_registry.py \
            tests/test_settings_flow.py \
            tests/test_voice_readiness.py \
            tests/test_smoke.py \
            --select E,W,F \
            --ignore E501

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install root dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install starlette httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Check main.py is valid Python
        run: python -c "compile(open('main.py').read(), 'main.py', 'exec')"
