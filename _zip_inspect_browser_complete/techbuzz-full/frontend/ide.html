<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>IDE — TechBuzz Empire</title>
<meta name="theme-color" content="#04060c">
<link rel="stylesheet" href="/frontend-assets/empire-pages.css">
<style>
:root{--bg:#04060c;--line:rgba(255,255,255,.09);--text:#edf2ff;--muted:#8899b8;--gold:#f1ca6b;--teal:#90f2d2;--vio:#c1a1ff;--danger:#ff847d}
body{background:var(--bg);color:var(--text);font-family:"Trebuchet MS",sans-serif;min-height:100vh}
.sky{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 40% 30%,rgba(144,242,210,.08),transparent 30%),linear-gradient(180deg,#04060c,#050a0f)}
.shell{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:0 14px 80px}
.ide-layout{display:grid;grid-template-columns:240px 1fr 340px;gap:12px;margin-top:14px}
.panel{border-radius:20px;padding:14px}
.ph{font-size:.68rem;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.fi{width:100%;padding:8px 12px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);font:inherit;outline:none;margin-bottom:7px;box-sizing:border-box}
.fi:focus{border-color:rgba(144,242,210,.35)}
.code-editor{width:100%;min-height:380px;font-family:"JetBrains Mono","Cascadia Code","Consolas",monospace;font-size:.85rem;line-height:1.65;background:rgba(0,0,0,.7);border:1px solid rgba(144,242,210,.15);border-radius:14px;padding:14px;color:#e2f8f0;outline:none;resize:vertical;box-sizing:border-box;tab-size:4}
.output-panel{background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;font-family:"JetBrains Mono","Consolas",monospace;font-size:.78rem;line-height:1.6;min-height:180px;max-height:280px;overflow-y:auto;white-space:pre-wrap;color:var(--teal)}
.lang-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:700;transition:all .15s}
.lang-btn.on{background:rgba(144,242,210,.09);border-color:rgba(144,242,210,.3);color:var(--teal)}
.abtn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 18px;border-radius:999px;background:linear-gradient(135deg,var(--teal),var(--vio));color:#060c14;border:none;font-weight:900;cursor:pointer;font-size:.85rem;transition:all .15s}
.abtn:hover{filter:brightness(1.1)}.abtn:disabled{opacity:.4}
.gbtn{padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line);font-weight:700;cursor:pointer;font-size:.8rem;transition:all .15s}
.gbtn:hover{border-color:rgba(193,161,255,.3);color:var(--vio)}
.proj-item{padding:8px 10px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:all .15s;font-size:.8rem;font-weight:700;display:flex;align-items:center;gap:7px}
.proj-item:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08)}
.snip-item{padding:7px 9px;border-radius:9px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.04);margin-bottom:6px;cursor:pointer;transition:all .15s}
.snip-item:hover{border-color:rgba(144,242,210,.25)}
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:1100px){.ide-layout{grid-template-columns:1fr};.ide-layout>*:first-child,.ide-layout>*:last-child{display:none}}
</style>
</head>
<body>
<div class="sky"></div>
<header class="portal-topbar">
  <div class="portal-brand"><span class="portal-kicker">IDE · Compiler · Code Execution · Python · C · SQL</span><strong>TechBuzz IDE</strong></div>
  <nav class="portal-links">
    <a href="/leazy">Leazy</a><a href="/research">Research</a><a href="/mission">Mission</a>
    <a href="/office">Office</a><a href="/ide" style="color:var(--teal)">IDE</a>
    <a href="#" onclick="logout()">Sign Out</a>
  </nav>
</header>
<div class="shell">
  <div class="ide-layout">
    <!-- Left: file tree + snippets -->
    <div>
      <div class="panel glass">
        <div class="ph">Projects</div>
        <div id="projectTree" style="max-height:200px;overflow-y:auto"></div>
        <button class="gbtn" style="width:100%;margin-top:8px" onclick="newProject()">+ New Project</button>
      </div>
      <div class="panel glass" style="margin-top:12px">
        <div class="ph">Snippets</div>
        <div id="snippetList" style="max-height:200px;overflow-y:auto"></div>
      </div>
    </div>

    <!-- Center: editor + output -->
    <div>
      <div class="panel glass">
        <!-- Language selector + toolbar -->
        <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            <button class="lang-btn on" onclick="setLang('python',this)">Python</button>
            <button class="lang-btn" onclick="setLang('javascript',this)">JS</button>
            <button class="lang-btn" onclick="setLang('c',this)">C/C++</button>
            <button class="lang-btn" onclick="setLang('sql',this)">SQL</button>
            <button class="lang-btn" onclick="setLang('bash',this)">Bash</button>
            <button class="lang-btn" onclick="setLang('html',this)">HTML</button>
          </div>
          <div style="flex:1"></div>
          <button class="gbtn" onclick="aiGenerate()">✨ AI Generate</button>
          <button class="gbtn" onclick="saveSnippet()">💾 Save</button>
          <button class="abtn" onclick="runCode()" id="runBtn">▶ Run</button>
        </div>
        <textarea class="code-editor" id="codeEditor" spellcheck="false" placeholder="# TechBuzz IDE
# Write your code here or click AI Generate
# Python, C/C++, SQL, JavaScript, Bash — all supported

# Example: Neural signal processor
import math
import random

def neural_signal(amplitude, frequency, t):
    return amplitude * math.sin(2 * math.pi * frequency * t)

# Generate 10 signal samples
signals = [neural_signal(1.0, 1.0, t/10) for t in range(10)]
for i, s in enumerate(signals):
    print(f't={i}: {s:.4f}')

print('Neural signals generated!')"></textarea>

        <!-- Status bar -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:.7rem;color:var(--muted);padding:0 4px">
          <span id="editorStatus">Ready — Python Sandbox</span>
          <span id="editorStats">0 lines</span>
        </div>

        <!-- Output -->
        <div style="margin-top:12px">
          <div class="ph" style="margin-bottom:6px;display:flex;justify-content:space-between">
            <span>Output</span>
            <span id="runStatus" style="color:var(--teal);font-size:.7rem"></span>
          </div>
          <div class="output-panel" id="outputPanel">Ready to run...</div>
        </div>
      </div>
    </div>

    <!-- Right: AI assist + history -->
    <div>
      <div class="panel glass">
        <div class="ph">✨ AI Code Assistant</div>
        <textarea class="fi" id="aiPrompt" placeholder="Describe what you want to code: 'sort a list of brain signals', 'parse JSON data', 'calculate GST on amount'..." style="min-height:80px;resize:vertical"></textarea>
        <button class="abtn" style="width:100%;background:linear-gradient(135deg,var(--vio),var(--rose))" onclick="aiAssist()">✨ Generate Code</button>
        <div id="aiSuggestion" style="margin-top:10px;font-size:.78rem;color:var(--muted)"></div>
      </div>
      <div class="panel glass" style="margin-top:12px">
        <div class="ph">📋 Execution History</div>
        <div id="execHistory" style="max-height:320px;overflow-y:auto"></div>
      </div>
    </div>
  </div>
</div>

<div class="portal-toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
let _lang='python';
async function api(path,opts){
  const r=await fetch(path,{credentials:'include',headers:{'Content-Type':'application/json'},...(opts||{})});
  if(r.status===401||r.status===403){window.location.href='/login?next=/ide';throw new Error('Auth');}
  const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.detail||'Error');return d;
}
function toast(m){const el=$('toast');el.textContent=m;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2600);}
function logout(){fetch('/api/auth/logout',{method:'POST',credentials:'include'});window.location.href='/login';}
function setLang(lang,btn){
  _lang=lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('on'));if(btn)btn.classList.add('on');
  $('editorStatus').textContent=`Ready — ${lang.charAt(0).toUpperCase()+lang.slice(1)}`;
}

// Editor stats
$('codeEditor').addEventListener('input',()=>{
  const lines=$('codeEditor').value.split('\n').length;
  $('editorStats').textContent=`${lines} lines`;
});

// Tab key in editor
$('codeEditor').addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();const s=$('codeEditor').selectionStart;const v=$('codeEditor').value;$('codeEditor').value=v.substring(0,s)+'    '+v.substring($('codeEditor').selectionEnd);$('codeEditor').selectionStart=$('codeEditor').selectionEnd=s+4;}
});

async function runCode(){
  const code=$('codeEditor').value.trim();if(!code){toast('Write some code first');return;}
  const btn=$('runBtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  $('runStatus').textContent='Running...';$('outputPanel').textContent='Executing...';
  try{
    const d=await api('/api/ide/execute',{method:'POST',body:JSON.stringify({code,language:_lang})});
    const ok=d.success!==false;
    $('outputPanel').textContent=(d.output||'')+(d.errors?'\n\nErrors:\n'+d.errors:'')+(d.ai_hint?'\n\nAI Hint: '+d.ai_hint:'');
    $('outputPanel').style.color=ok?'var(--teal)':'var(--danger)';
    $('runStatus').textContent=ok?`✅ ${d.runtime_ms}ms`:`❌ Error`;
    loadExecHistory();
  }catch(e){$('outputPanel').textContent='Error: '+e.message;$('runStatus').textContent='❌ Error';}
  btn.disabled=false;btn.textContent='▶ Run';
}

async function aiGenerate(){
  const prompt=$('aiPrompt').value.trim()||'hello world program';
  const d=await api('/api/ide/ai-generate',{method:'POST',body:JSON.stringify({description:prompt,language:_lang})});
  $('codeEditor').value=d.code||'# AI generation failed';
  $('aiSuggestion').textContent='Generated! Review and run.';
}
async function aiAssist(){await aiGenerate();}

async function saveSnippet(){
  const code=$('codeEditor').value.trim();if(!code)return;
  const title=prompt('Snippet name:','My Snippet');if(!title)return;
  await api('/api/ide/snippet',{method:'POST',body:JSON.stringify({title,language:_lang,code})});
  toast('Snippet saved!');loadSnippets();
}

async function newProject(){
  const name=prompt('Project name:','New Project');if(!name)return;
  await api('/api/ide/project',{method:'POST',body:JSON.stringify({name,language:_lang,files:{'main.py':$('codeEditor').value}})});
  toast('Project created!');loadProjects();
}

async function loadProjects(){
  const d=await api('/api/ide/projects').catch(()=>({projects:[]}));
  const LANG_ICONS={python:'🐍',javascript:'⚡',c:'⚙️',sql:'🗄️',bash:'💻'};
  $('projectTree').innerHTML=(d.projects||[]).map(p=>`
    <div class="proj-item" onclick="loadProject('${p.id}')">
      <span>${LANG_ICONS[p.language]||'📄'}</span>${p.name}
    </div>`).join('')||'<div style="color:var(--muted);font-size:.78rem;padding:8px">No projects yet</div>';
}
async function loadProject(pid){
  const d=await api('/api/ide/project/'+pid);
  const files=JSON.parse(d.files||'{}');
  const mainCode=files[d.main_file]||Object.values(files)[0]||'';
  $('codeEditor').value=mainCode;
  setLang(d.language,null);
}

async function loadSnippets(){
  const d=await api('/api/ide/snippets').catch(()=>({snippets:[]}));
  $('snippetList').innerHTML=(d.snippets||[]).map(s=>`
    <div class="snip-item" onclick="loadSnippet('${s.id}')">
      <div style="font-weight:700;font-size:.75rem">${s.title}</div>
      <div style="font-size:.65rem;color:var(--muted)">${s.language}</div>
    </div>`).join('')||'<div style="color:var(--muted);font-size:.75rem;padding:6px">No snippets</div>';
}
async function loadSnippet(sid){
  const d=await api('/api/ide/snippets').catch(()=>({snippets:[]}));
  // Simple: just show the snippet
}
async function loadExecHistory(){
  const d=await api('/api/ide/execution-log').catch(()=>({logs:[]}));
  $('execHistory').innerHTML=(d.logs||[]).slice(0,10).map(l=>`
    <div style="padding:6px 8px;border-radius:9px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);margin-bottom:5px">
      <div style="display:flex;justify-content:space-between;font-size:.7rem">
        <span style="color:${l.success?'var(--teal)':'var(--danger)'};font-weight:700">${l.language}</span>
        <span style="color:var(--muted)">${l.runtime_ms}ms</span>
      </div>
      <div style="font-size:.68rem;color:var(--muted);font-family:monospace">${(l.output||l.errors||'').slice(0,60)}</div>
    </div>`).join('')||'<div style="color:var(--muted);text-align:center;padding:10px;font-size:.8rem">No executions yet</div>';
}

(async()=>{
  try{
    const r=await fetch('/api/auth/me',{credentials:'include'});
    if(!r.ok){window.location.href='/login?next=/ide';return;}
    const me=await r.json();if(!me.authenticated||me.user?.role!=='master'){window.location.href='/login?next=/ide';return;}
    await Promise.all([loadProjects(),loadSnippets(),loadExecHistory()]);
  }catch{window.location.href='/login?next=/ide';}
})();
</script>
</body>
</html>
