<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TechBuzz Network — Professional Intelligence</title>
<meta name="theme-color" content="#04060c">
<link rel="stylesheet" href="/frontend-assets/empire-pages.css">
<style>
.net-wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 16px 80px;display:grid;grid-template-columns:300px 1fr;gap:16px;min-height:calc(100vh - 64px)}
.net-rail{padding-top:20px;display:flex;flex-direction:column;gap:12px}
.net-main{padding-top:20px;display:flex;flex-direction:column;gap:14px}
.rail-card{border-radius:22px;padding:16px}
.rail-h{font-size:.7rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
/* Stats */
.net-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ns{padding:11px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.04);text-align:center}
.ns strong{display:block;font-family:var(--heading);font-size:1.4rem;color:var(--gold)}
.ns span{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
/* Connections list */
.conn-list{display:flex;flex-direction:column;gap:7px;max-height:280px;overflow-y:auto}
.conn-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);transition:background .15s}
.conn-item:hover{background:rgba(255,255,255,.07)}
.conn-av{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(241,202,107,.2),rgba(193,161,255,.15));display:flex;align-items:center;justify-content:center;font-weight:900;font-family:var(--heading);font-size:1rem;flex-shrink:0}
.conn-name{font-weight:700;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conn-title{font-size:.72rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conn-del{margin-left:auto;background:none;border:none;color:var(--danger);cursor:pointer;font-size:.8rem;opacity:.4;transition:opacity .15s;flex-shrink:0}
.conn-del:hover{opacity:1}
/* Add conn form */
.fg{margin-bottom:9px}
.fl{display:block;font-size:.68rem;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:3px}
.fi{width:100%;padding:9px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);font:inherit;outline:none;transition:border-color .15s}
.fi:focus{border-color:rgba(241,202,107,.4)}
/* Carbon mode selector */
.carbon-modes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.cmode{padding:8px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.04);cursor:pointer;text-align:center;transition:all .15s}
.cmode.on{background:rgba(144,242,210,.07);border-color:rgba(144,242,210,.3)}
.cmode-name{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em}
.cmode-icon{font-size:1.1rem;margin-bottom:3px}
/* Posts feed */
.compose-card{border-radius:24px;padding:18px}
.compose-ta{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;padding:12px 14px;color:var(--text);font:inherit;resize:vertical;min-height:80px;line-height:1.6;transition:border-color .15s}
.compose-ta:focus{border-color:rgba(241,202,107,.4);outline:none}
.kind-row{display:flex;gap:7px;flex-wrap:wrap;margin:9px 0}
.kbtn{padding:5px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:700;transition:all .15s}
.kbtn.on,.kbtn:hover{border-color:rgba(241,202,107,.3);color:var(--gold);background:rgba(241,202,107,.07)}
.post-card{border-radius:22px;padding:18px}
.post-enhanced{font-size:.82rem;color:var(--muted);border-left:2px solid rgba(241,202,107,.3);padding-left:10px;margin-top:10px;line-height:1.65;display:none;white-space:pre-wrap}
.signal-card{border-radius:20px;padding:16px}
.signal-query{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.signal-mode{font-size:.68rem;padding:2px 8px;border-radius:999px;font-weight:800;margin-left:8px}
.gm{background:rgba(144,242,210,.1);color:var(--teal)}.dm{background:rgba(135,223,255,.1);color:var(--blue)}.nm{background:rgba(193,161,255,.1);color:var(--violet)}
.signal-analysis{font-size:.85rem;line-height:1.7;color:var(--text);white-space:pre-wrap}
/* Buttons */
.abtn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:999px;background:linear-gradient(135deg,var(--gold),#ff9c63);color:#0b0f17;border:none;font-weight:900;cursor:pointer;font-size:.85rem;transition:all .15s;white-space:nowrap}
.abtn:hover{filter:brightness(1.1)}.abtn:disabled{opacity:.4;cursor:not-allowed}
.gbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line);font-weight:700;cursor:pointer;font-size:.82rem;transition:all .15s;white-space:nowrap}
.gbtn:hover{border-color:rgba(241,202,107,.35);color:var(--gold)}.gbtn:disabled{opacity:.4;cursor:not-allowed}
.spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:_sp .7s linear infinite}
@keyframes _sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:22px;color:var(--muted);border:1px dashed var(--line);border-radius:16px;font-size:.85rem}
.brain-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(144,242,210,.05);border:1px solid rgba(144,242,210,.12);border-radius:12px;font-size:.8rem;color:var(--muted)}
.bdot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);flex-shrink:0;animation:bdp 2s ease-in-out infinite}
@keyframes bdp{0%,100%{opacity:.5}50%{opacity:1}}
@media(max-width:900px){.net-wrap{grid-template-columns:1fr}.net-rail{order:2}}
</style>
</head>
<body>
<div class="portal-sky">
  <video autoplay muted loop playsinline src="/frontend-assets/media/nebula-orbit.mp4"></video>
</div>
<header class="portal-topbar">
  <div class="portal-brand">
    <span class="portal-kicker" id="modeBadge">Graphene-Mind · Global signal mesh</span>
    <strong>TechBuzz Network</strong>
  </div>
  <nav class="portal-links">
    <a href="/leazy">Leazy</a><a href="/hq">HQ</a><a href="/ats">ATS</a>
    <a href="/network" style="border-color:rgba(241,202,107,.35);color:var(--gold)">Network</a>
    <a href="/agent">Agent</a><a href="/neural">Neural</a>
    <a href="#" onclick="logout()">Sign Out</a>
  </nav>
</header>

<div class="net-wrap">
  <!-- Rail -->
  <aside class="net-rail">
    <div class="rail-card glass">
      <div class="rail-h">Network Stats</div>
      <div class="net-stats" id="netStats"></div>
    </div>

    <!-- Carbon Mode -->
    <div class="rail-card glass">
      <div class="rail-h">Carbon Protocol Mode</div>
      <div class="carbon-modes" id="carbonModes">
        <div class="cmode on" id="cm-graphene" onclick="setMode('graphene')">
          <div class="cmode-icon">🕸️</div>
          <div class="cmode-name" style="color:var(--teal)">Graphene</div>
        </div>
        <div class="cmode" id="cm-diamond" onclick="setMode('diamond')">
          <div class="cmode-icon">💎</div>
          <div class="cmode-name" style="color:var(--blue)">Diamond</div>
        </div>
        <div class="cmode" id="cm-nanotube" onclick="setMode('nanotube')">
          <div class="cmode-icon">⚡</div>
          <div class="cmode-name" style="color:var(--violet)">Nanotube</div>
        </div>
      </div>
      <div id="modeDesc" style="font-size:.78rem;color:var(--muted);line-height:1.5"></div>
    </div>

    <!-- Signal Scanner -->
    <div class="rail-card glass">
      <div class="rail-h">Market Signal Scanner</div>
      <div class="fg"><input class="fi" id="sigQuery" placeholder="AI hiring India 2025, React demand..." onkeydown="if(event.key==='Enter')scanSignal()"></div>
      <button class="abtn" style="width:100%;justify-content:center" id="scanBtn" onclick="scanSignal()">📡 Scan Signals</button>
      <div id="scanResult" style="margin-top:10px;font-size:.8rem;color:var(--muted)"></div>
    </div>

    <!-- Add Connection -->
    <div class="rail-card glass">
      <div class="rail-h">Add Connection</div>
      <div class="fg"><label class="fl">Name</label><input class="fi" id="cName" placeholder="Rajesh Kumar"></div>
      <div class="fg"><label class="fl">Title & Company</label><input class="fi" id="cTitle" placeholder="VP Eng · Google India"></div>
      <div class="fg"><label class="fl">LinkedIn</label><input class="fi" id="cLinkedin" placeholder="linkedin.com/in/..." onkeydown="if(event.key==='Enter')addConn()"></div>
      <button class="gbtn" style="width:100%;justify-content:center" onclick="addConn()">+ Connect</button>
    </div>

    <!-- Connections -->
    <div class="rail-card glass">
      <div class="rail-h">Connections</div>
      <div class="conn-list" id="connList"></div>
    </div>
  </aside>

  <!-- Main feed -->
  <main class="net-main">
    <div class="brain-bar glass"><div class="bdot"></div><span id="brainMsg">Graphene-Mind active — global signal mesh synchronized</span></div>

    <!-- Compose -->
    <div class="compose-card glass">
      <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px">
        <div style="width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,rgba(241,202,107,.2),rgba(193,161,255,.15));display:flex;align-items:center;justify-content:center;font-weight:900;font-family:var(--heading);font-size:1.1rem;flex-shrink:0">T</div>
        <textarea class="compose-ta" id="postContent" placeholder="Share a hiring update, market insight, or thought with your TechBuzz network..."></textarea>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div class="kind-row" id="kindRow">
          <button class="kbtn on" id="k-post" onclick="setKind('post',this)">📝 Post</button>
          <button class="kbtn" id="k-hiring" onclick="setKind('hiring',this)">💼 Hiring</button>
          <button class="kbtn" id="k-insight" onclick="setKind('insight',this)">💡 Insight</button>
          <button class="kbtn" id="k-signal" onclick="setKind('signal',this)">📡 Signal</button>
        </div>
        <button class="abtn" id="postBtn" onclick="publishPost()">✨ AI Enhance & Post</button>
      </div>
    </div>

    <!-- Feed -->
    <div id="feed"></div>
  </main>
</div>

<div class="portal-toast" id="toast"></div>
<script>
const API='',_$=id=>document.getElementById(id);
let _n=null,_mode='graphene',_kind='post';
const MODES={
  graphene:{name:'Graphene-Mind',desc:'Vast 2D parallel processing — global signals in near-zero time',color:'var(--teal)'},
  diamond:{name:'Diamond-Mind',desc:'Tetrahedral focus — every process interlocked on one deep problem',color:'var(--blue)'},
  nanotube:{name:'Nanotube-Mind',desc:'Perfect frictionless conduit — zero-loss information channeling',color:'var(--violet)'}
};

function toast(m,t=2600){const el=_$('toast');el.textContent=m;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',t);}
function logout(){fetch(API+'/api/auth/logout',{method:'POST',credentials:'include'});window.location.href='/login';}
async function api(url,method='GET',body){
  const r=await fetch(API+url,{method,credentials:'include',headers:{'Content-Type':'application/json'},...(body?{body:JSON.stringify(body)}:{})});
  if(r.status===401||r.status===403){window.location.href='/login?next=/network';throw new Error('Auth');}
  const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.detail||'Error');return d;
}

function setMode(m){
  _mode=m;
  document.querySelectorAll('.cmode').forEach(el=>el.classList.remove('on'));
  _$('cm-'+m).classList.add('on');
  const info=MODES[m];
  _$('modeDesc').textContent=info.desc;
}
function setKind(k,btn){
  _kind=k;
  document.querySelectorAll('.kbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

async function load(){
  _n=await api('/api/network/state');
  renderStats();renderFeed();renderConns();
  _$('brainMsg').textContent=`${MODES[_mode].name} active · ${_n.stats?.connections} connections · ${_n.stats?.signals} signals`;
}

function renderStats(){
  const s=_n.stats||{};
  _$('netStats').innerHTML=[['Connections',s.connections||0],['Posts',s.posts||0],['Signals',s.signals||0]]
    .map(([l,v])=>`<div class="ns"><strong>${v}</strong><span>${l}</span></div>`).join('');
}

function renderConns(){
  const conns=_n.connections||[];
  _$('connList').innerHTML=conns.length?conns.map(c=>`
    <div class="conn-item">
      <div class="conn-av">${(c.name||'?')[0].toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <div class="conn-name">${c.name}</div>
        <div class="conn-title">${c.title||''}${c.company?' · '+c.company:''}</div>
      </div>
      <button class="conn-del" onclick="delConn('${c.id}')">✕</button>
    </div>`).join(''):`<div style="color:var(--muted);font-size:.8rem;text-align:center;padding:12px">No connections yet.</div>`;
}

function renderFeed(){
  const posts=_n.posts||[];const signals=_n.signals||[];
  const all=[...posts.map(p=>({...p,_type:'post'})),...signals.map(s=>({...s,_type:'signal'}))];
  all.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));
  _$('feed').innerHTML=all.length?all.map(item=>{
    if(item._type==='signal'){
      const mc=item.carbon_mode==='diamond'?'dm':item.carbon_mode==='nanotube'?'nm':'gm';
      return `<div class="signal-card glass">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:.8rem;color:var(--muted)">📡 ${new Date(item.created_at).toLocaleDateString('en-IN')}</span>
          <span class="signal-mode ${mc}">${item.carbon_mode||'graphene'}-Mind</span>
        </div>
        <div style="font-weight:700;margin-bottom:8px">${item.query}</div>
        <div class="signal-analysis">${item.analysis||''}</div>
      </div>`;
    }
    return `<div class="post-card glass">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,rgba(241,202,107,.2),rgba(193,161,255,.15));display:flex;align-items:center;justify-content:center;font-weight:900;font-family:var(--heading);font-size:1.1rem;flex-shrink:0">T</div>
        <div>
          <div style="font-weight:700;font-size:.92rem">TechBuzz Systems</div>
          <div style="font-size:.72rem;color:var(--muted)">${new Date(item.created_at).toLocaleDateString('en-IN')} · ${item.kind||'post'}</div>
        </div>
        ${item.enhanced?`<button class="gbtn" style="margin-left:auto;font-size:.75rem;padding:5px 10px" onclick="toggleEnhanced(this)">✨ AI Version</button>`:''}
      </div>
      <div style="font-size:.92rem;line-height:1.75;white-space:pre-wrap">${item.content||''}</div>
      ${item.enhanced?`<div class="post-enhanced">${item.enhanced}</div>`:''}
      <div style="display:flex;gap:7px;margin-top:12px">
        <button class="gbtn" style="font-size:.78rem;padding:5px 11px" onclick="likePost('${item.id}',this)">👍 ${item.likes||0}</button>
        <button class="gbtn" style="font-size:.78rem;padding:5px 11px" onclick="copyPost('${item.id}')">🔗 Copy</button>
      </div>
    </div>`;
  }).join(''):`<div class="empty">Your network feed is empty. Post an update or run a Signal Scan to populate it.</div>`;
}

function toggleEnhanced(btn){
  const card=btn.closest('.post-card'),enh=card.querySelector('.post-enhanced');
  if(enh){const show=enh.style.display!=='block';enh.style.display=show?'block':'none';btn.textContent=show?'📝 Original':'✨ AI Version';}
}

async function publishPost(){
  const content=_$('postContent').value.trim();if(!content){toast('Write something first');return;}
  const btn=_$('postBtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span> AI enhancing...';
  try{
    await api('/api/network/post','POST',{content,kind:_kind});
    _$('postContent').value='';toast('Posted with AI enhancement!');await load();
  }catch(e){toast(e.message);}
  btn.disabled=false;btn.textContent='✨ AI Enhance & Post';
}

async function addConn(){
  const name=_$('cName').value.trim();if(!name){toast('Enter name');return;}
  const title=_$('cTitle').value;const parts=title.split('·');
  await api('/api/network/connect','POST',{name,title:(parts[0]||'').trim(),company:(parts[1]||'').trim(),linkedin:_$('cLinkedin').value});
  _$('cName').value='';_$('cTitle').value='';_$('cLinkedin').value='';
  toast(`${name} connected!`);await load();
}

async function delConn(id){
  await api(`/api/network/connections/${id}`,'DELETE');toast('Removed');await load();
}

async function likePost(id,btn){
  await api(`/api/network/posts/${id}/like`,'POST',{});
  btn.textContent='👍 '+(parseInt((btn.textContent.match(/\d+/)||['0'])[0])+1);
}

function copyPost(id){
  const card=document.querySelector(`[data-pid="${id}"] .post-content`);
  toast('Link copied!');
}

async function scanSignal(){
  const q=_$('sigQuery').value.trim();if(!q){toast('Enter a market signal query');return;}
  const btn=_$('scanBtn');btn.disabled=true;btn.innerHTML=`<span class="spin"></span> ${MODES[_mode].name}...`;
  _$('scanResult').textContent='Scanning...';
  try{
    const d=await api('/api/network/signal','POST',{query:q,mode:_mode});
    toast('Signal scan complete!');_$('sigQuery').value='';_$('scanResult').textContent='';await load();
  }catch(e){toast(e.message);}
  btn.disabled=false;btn.textContent='📡 Scan Signals';
}

// Carbon stream
const es=new EventSource(API+'/api/carbon/stream');
es.onmessage=e=>{
  try{
    const d=JSON.parse(e.data);
    const mb=_$('modeBadge');if(mb)mb.textContent=`${d.carbon_mode}-Mind · ${d.identity} · ${(d.avatars||[]).join(' + ')}`;
    _$('brainMsg').textContent=`${MODES[d.carbon_mode||'graphene'].name} active · ${_n?.stats?.connections||0} connections · ${d.vault_size||0} vault memories`;
  }catch{}
};

// Init
setMode('graphene');
_$('modeDesc').textContent=MODES.graphene.desc;
(async()=>{
  try{
    const r=await fetch(API+'/api/auth/me',{credentials:'include'});
    if(!r.ok){window.location.href='/login?next=/network';return;}
    const me=await r.json();
    if(!me.authenticated||me.user?.role!=='master'){window.location.href='/login?next=/network';return;}
    await load();
  }catch{window.location.href='/login?next=/network';}
})();
</script>
</body>
</html>
